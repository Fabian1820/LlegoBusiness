query GetProductsByIds($ids: [String!], $first: Int = 100) {
  products(ids: $ids, first: $first) {
    edges {
      node {
        id
        branchId
        name
        description
        weight
        price
        currency
        image
        availability
        categoryId
        variantListIds
        createdAt
        imageUrl
        imageUrlMuyBaja
        imageUrlBaja
        imageUrlMedia
        imageUrlAlta
        imageUrlOriginal
      }
    }
    pageInfo {
      hasNextPage
      endCursor
      totalCount
    }
  }
}
