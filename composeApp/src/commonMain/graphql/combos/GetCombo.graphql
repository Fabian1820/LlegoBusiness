query GetCombo($comboId: String!) {
  combo(comboId: $comboId) {
    id
    branchId
    name
    description
    image
    imageUrl
    startingFinalPrice
    startingSavings
    discountType
    discountValue
    availability
    representativeProducts {
      id
      name
      imageUrl
    }
    slots {
      id
      name
      description
      minSelections
      maxSelections
      isFree
      displayOrder
      options {
        productId
        isDefault
        priceAdjustment
        product {
          id
          name
          price
          imageUrl
        }
        availableModifiers {
          name
          priceAdjustment
        }
      }
    }
    giftOptions {
      productId
      product {
        id
        name
        imageUrl
      }
    }
    createdAt
  }
}
