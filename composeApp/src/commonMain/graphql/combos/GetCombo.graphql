query GetCombo($comboId: String!) {
  combo(comboId: $comboId) {
    id
    name
    description
    image
    basePrice
    finalPrice
    savings
    discountType
    discountValue
    availability
    representativeProducts {
      id
      name
      imageUrl
    }
    slots {
      name
      minSelections
      maxSelections
      options {
        productId
        isDefault
        priceAdjustment
        product {
          id
          name
          price
          imageUrl
        }
        availableModifiers {
          name
          priceAdjustment
        }
      }
    }
    createdAt
  }
}
