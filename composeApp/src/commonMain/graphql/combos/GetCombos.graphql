query GetCombos($branchId: String!, $availableOnly: Boolean = false) {
  combosByBranch(branchId: $branchId, availableOnly: $availableOnly) {
    id
    name
    description
    image
    basePrice
    finalPrice
    savings
    discountType
    discountValue
    availability
    representativeProducts {
      id
      name
      imageUrl
    }
    slots {
      id
      name
      description
      minSelections
      maxSelections
      isRequired
      displayOrder
      options {
        productId
        isDefault
        priceAdjustment
        product {
          id
          name
          price
          imageUrl
        }
        availableModifiers {
          name
          priceAdjustment
        }
      }
    }
    createdAt
  }
}
