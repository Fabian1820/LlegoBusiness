query DashboardStats(
  $businessId: String!
  $fromDate: DateTime!
  $toDate: DateTime!
  $jwt: String!
  $branchId: String
) {
  dashboardStats(
    businessId: $businessId
    fromDate: $fromDate
    toDate: $toDate
    jwt: $jwt
    branchId: $branchId
  ) {
    totalRevenue
    completedOrders
    cancelledOrders
    topProducts {
      productId
      name
      imageUrl
      imageUrlMuyBaja
      totalQuantity
      totalRevenue
    }
  }
}
