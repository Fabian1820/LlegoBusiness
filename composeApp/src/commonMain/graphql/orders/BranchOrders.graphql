query BranchOrders(
  $branchId: String!
  $jwt: String!
  $status: OrderStatusEnum = null
  $fromDate: DateTime = null
  $toDate: DateTime = null
  $limit: Int! = 50
  $offset: Int! = 0
) {
  branchOrders(
    branchId: $branchId
    jwt: $jwt
    status: $status
    fromDate: $fromDate
    toDate: $toDate
    limit: $limit
    offset: $offset
  ) {
    orders {
      ...OrderFullFields
    }
    totalCount
    hasMore
  }
}
