mutation CreateShowcase($input: CreateShowcaseInput!, $jwt: String) {
  createShowcase(input: $input, jwt: $jwt) {
    id
    branchId
    title
    image
    description
    isActive
    imageUrl
    createdAt
    updatedAt
    items {
      id
      name
      description
      price
      availability
    }
  }
}
