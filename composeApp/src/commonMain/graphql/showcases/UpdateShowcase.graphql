mutation UpdateShowcase($showcaseId: String!, $input: UpdateShowcaseInput!, $jwt: String) {
  updateShowcase(showcaseId: $showcaseId, input: $input, jwt: $jwt) {
    id
    branchId
    title
    image
    description
    isActive
    imageUrl
    createdAt
    updatedAt
    items {
      id
      name
      description
      price
      availability
    }
  }
}
