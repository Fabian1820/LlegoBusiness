query GetProducts($branchId: String, $categoryId: String, $availableOnly: Boolean = false, $first: Int = 100, $after: String) {
  products(branchId: $branchId, categoryId: $categoryId, availableOnly: $availableOnly, first: $first, after: $after) {
    edges {
      node {
        id
        branchId
        name
        description
        weight
        price
        currency
        image
        availability
        categoryId
        variantListIds
        createdAt
        imageUrl
        imageUrlMuyBaja
        imageUrlBaja
        imageUrlMedia
        imageUrlAlta
        imageUrlOriginal
      }
    }
    pageInfo {
      hasNextPage
      endCursor
      totalCount
    }
  }
}
