fragment CoordinatesFields on CoordinatesType {
  type
  coordinates
}

fragment WalletBalanceFields on WalletBalanceType {
  local
  usd
}

fragment BranchCoreFields on BranchType {
  id
  businessId
  name
  address
  phone
  tipos
  useAppMessaging
  vehicles
  accounts {
    cardNumber
    cardHolderName
    bankName
    isActive
  }
  qrPayments {
    value
    isActive
  }
  phones {
    phone
    isActive
  }
  acceptedCurrency
  exchangeRate
  paymentMethodIds
  managerIds
  avatar
  coverImage
  avatarUrl
  avatarUrlBaja
  avatarUrlAlta
  coverUrl
  coverUrlBaja
  coverUrlAlta
  isActive
  socialMedia
  coordinates {
    ...CoordinatesFields
  }
  schedule
  createdAt
  wallet {
    ...WalletBalanceFields
  }
  walletStatus
}

