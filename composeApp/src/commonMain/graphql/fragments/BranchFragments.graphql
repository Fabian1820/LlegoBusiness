fragment CoordinatesFields on CoordinatesType {
  type
  coordinates
}

fragment WalletBalanceFields on WalletBalanceType {
  local
  usd
}

fragment BranchCoreFields on BranchType {
  id
  businessId
  name
  address
  phone
  tipos
  useAppMessaging
  vehicles
  paymentMethodIds
  managerIds
  avatar
  coverImage
  avatarUrl
  coverUrl
  status
  deliveryRadius
  coordinates {
    ...CoordinatesFields
  }
  schedule
  facilities
  createdAt
  wallet {
    ...WalletBalanceFields
  }
  walletStatus
}

