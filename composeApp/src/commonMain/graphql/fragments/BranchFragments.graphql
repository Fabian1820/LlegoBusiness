fragment CoordinatesFields on CoordinatesType {
  type
  coordinates
}

fragment WalletBalanceFields on WalletBalanceType {
  local
  usd
}

fragment BranchCoreFields on BranchType {
  id
  businessId
  name
  address
  phone
  tipos
  pickupEnabled
  useAppMessaging
  catalogOnly
  vehicles
  accounts {
    cardNumber
    confirmPhone
    cardHolderName
    pagoQr
    isActive
  }
  acceptedCurrency
  exchangeRate
  paymentMethodIds
  managerIds
  avatar
  coverImage
  avatarUrl
  avatarUrlBaja
  avatarUrlAlta
  coverUrl
  coverUrlBaja
  coverUrlAlta
  isActive
  socialMedia
  coordinates {
    ...CoordinatesFields
  }
  schedule {
    days {
      day
      isOpen
      hours {
        open
        close
      }
    }
  }
  createdAt
  wallet {
    ...WalletBalanceFields
  }
  walletStatus
}

