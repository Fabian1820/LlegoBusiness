query GetUserWithBusinessesAndBranches($jwt: String!) {
  me(jwt: $jwt) {
    ...UserCoreFields
  }

  getMyBusinesses: getMyBusinessesWithBranches(jwt: $jwt) {
    ...BusinessRoleFields
  }

  getBusinessesWithBranches: getMyBusinessesWithBranches(jwt: $jwt) {
    ...BusinessRoleFields
    branches {
      ...BranchCoreFields
    }
  }
}
