query GetUserWithBusinessesAndBranches($jwt: String!) {
  me(jwt: $jwt) {
    id
    name
    email
    username
    phone
    role
    avatar
    businessIds
    branchIds
    createdAt
    authProvider
    providerUserId
    applePrivateEmail
    wallet {
      local
      usd
    }
    walletStatus
    avatarUrl
  }

  getMyBusinesses(jwt: $jwt) {
    id
    name
    avatar
    avatarUrl
    description
    tags
    socialMedia
    isActive
    ownerId
    globalRating
    createdAt
  }

  getBusinessesWithBranches(jwt: $jwt) {
    id
    name
    avatar
    avatarUrl
    description
    tags
    socialMedia
    isActive
    ownerId
    globalRating
    createdAt
    branches {
      id
      name
      businessId
      address
      phone
      tipos
      coordinates {
        type
        coordinates
      }
      avatar
      avatarUrl
      coverImage
      coverUrl
      status
      wallet {
        local
        usd
      }
      walletStatus
      managerIds
      schedule
      deliveryRadius
      facilities
      paymentMethodIds
      createdAt
    }
  }
}
