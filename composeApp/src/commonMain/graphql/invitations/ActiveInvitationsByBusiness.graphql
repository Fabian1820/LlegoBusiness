query ActiveInvitationsByBusiness($businessId: String!) {
    activeInvitationsByBusiness(businessId: $businessId) {
        id
        code
        invitationType
        status
        accessDurationDays
        accessExpiresAt
        isUsable
        accessStatus
        createdAt
        usedAt
        business {
            ...BusinessReferenceFields
        }
        branch {
            ...BranchReferenceFields
        }
        creator {
            ...UserReferenceFields
        }
        redeemer {
            ...UserReferenceFields
        }
    }
}
