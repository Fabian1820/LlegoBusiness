query InvitationByCode($code: String!) {
    invitationByCode(code: $code) {
        id
        code
        invitationType
        status
        accessDurationDays
        accessExpiresAt
        isUsable
        accessStatus
        createdAt
        usedAt
        business {
            ...BusinessReferenceFields
        }
        branch {
            ...BranchReferenceFields
        }
        creator {
            ...UserReferenceFields
        }
        redeemer {
            ...UserReferenceFields
        }
    }
}
