mutation CreateProduct($input: CreateProductInput!, $jwt: String) {
  createProduct(input: $input, jwt: $jwt) {
    id
    name
    description
    price
    currency
    weight
    branchId
    categoryId
    variantListIds
    image
    imageUrl
    imageUrlMuyBaja
    imageUrlBaja
    imageUrlMedia
    imageUrlAlta
    imageUrlOriginal
    availability
    createdAt
  }
}
