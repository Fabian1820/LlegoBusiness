mutation UpdateProduct($productId: String!, $input: UpdateProductInput!, $jwt: String) {
  updateProduct(productId: $productId, input: $input, jwt: $jwt) {
    id
    name
    description
    price
    currency
    weight
    branchId
    categoryId
    variantListIds
    image
    imageUrl
    imageUrlMuyBaja
    imageUrlBaja
    imageUrlMedia
    imageUrlAlta
    imageUrlOriginal
    availability
    createdAt
  }
}
