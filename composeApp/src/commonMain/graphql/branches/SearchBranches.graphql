query SearchBranches(
  $query: String!
  $first: Int
  $after: String
  $jwt: String
) {
  searchBranches(
    query: $query
    first: $first
    after: $after
    jwt: $jwt
  ) {
    edges {
      cursor
      node {
        ...ScoredBranchCoreFields
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}
