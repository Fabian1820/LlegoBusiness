query GetBranches(
  $first: Int
  $after: String
  $businessId: String
  $tipo: BranchTipo
  $radiusKm: Float
  $jwt: String
) {
  branches(
    first: $first
    after: $after
    businessId: $businessId
    tipo: $tipo
    radiusKm: $radiusKm
    jwt: $jwt
  ) {
    edges {
      cursor
      node {
        ...ScoredBranchCoreFields
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
      totalCount
    }
  }
}
