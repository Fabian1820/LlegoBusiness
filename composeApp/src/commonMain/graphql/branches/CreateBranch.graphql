mutation CreateBranch($input: CreateBranchInput!, $jwt: String) {
  createBranch(input: $input, jwt: $jwt) {
    id
    businessId
    name
    address
    phone
    tipos
    paymentMethodIds
    managerIds
    avatar
    coverImage
    avatarUrl
    coverUrl
    status
    deliveryRadius
    coordinates {
      type
      coordinates
    }
    schedule
    facilities
    createdAt
    wallet {
      local
      usd
    }
    walletStatus
  }
}
